
[functions.analyze-scope]
enabled = true
verify_jwt = true
import_map = "./functions/analyze-scope/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/analyze-scope/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/analyze-scope/*.html" ]

[functions.share-scope]
enabled = true
verify_jwt = true
entrypoint = "./functions/share-scope/index.ts"

[functions.public-scope]
enabled = true
verify_jwt = false
entrypoint = "./functions/public-scope/index.ts"
